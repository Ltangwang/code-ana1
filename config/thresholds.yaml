# Optional reference thresholds (not auto-loaded; tune via config/settings.yaml as needed).
# Former AST / hotspot sections were removed with the defect-analysis prototype.

confidence:
  high: 0.7
  medium: 0.4
  low: 0.0

severity:
  critical:
    min_confidence: 0.8
    priority: 1
  high:
    min_confidence: 0.6
    priority: 2
  medium:
    min_confidence: 0.4
    priority: 3
  low:
    min_confidence: 0.3
    priority: 4
  info:
    min_confidence: 0.2
    priority: 5

budget:
  critical: 0.1
  low: 0.2
  warning: 0.4

upload:
  max_confidence_for_upload: 0.6
  always_upload_severity:
    - "critical"
  budget_multipliers:
    critical: 2.0
    low: 1.5
    warning: 1.2
    normal: 1.0

performance:
  max_local_inference_time_ms: 5000
  max_cloud_api_time_ms: 30000
  alert_thresholds:
    local_inference_ms: 10000
    cloud_api_ms: 60000
    total_analysis_ms: 300000

quality:
  min_code_fragment_lines: 3
  max_code_fragment_lines: 100
  min_confidence_to_report: 0.3
  min_fixes_to_generate: 1
  max_fixes_to_generate: 5

rate_limits:
  local_per_minute: 100
  cloud_per_minute: 20
  cloud_per_hour: 500
  cloud_per_day: 5000
